<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>BookNest - Your Favorite Bookstore</title>
    <style>
        body {
            margin: 0;
            font-family: Arial, sans-serif;
            background-color: #f9f9f9;
        }

        header {
            background-color: #2c3e50;
            color: white;
            padding: 15px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        header h1 {
            margin: 0;
        }

        nav a {
            color: white;
            margin-left: 20px;
            text-decoration: none;
            font-weight: bold;
        }

        nav a:hover {
            text-decoration: underline;
        }

        .hero {
            background: url('https://images.unsplash.com/photo-1512820790803-83ca734da794') no-repeat center/cover;
            color: white;
            text-align: center;
            padding: 100px 20px;
        }

        .hero h2 {
            font-size: 40px;
            margin-bottom: 10px;
        }

        .hero p {
            font-size: 18px;
        }

        .section {
            padding: 40px 20px;
            text-align: center;
        }

        .books {
            display: flex;
            flex-wrap: wrap;
            justify-content: center;
            gap: 20px;
        }

        .book-card {
            background: white;
            padding: 15px;
            width: 200px;
            border-radius: 8px;
            box-shadow: 0 2px 6px rgba(0,0,0,0.1);
        }

        .book-card img {
            width: 100%;
            border-radius: 5px;
        }

        .book-card h3 {
            font-size: 16px;
            margin: 10px 0 5px;
        }

        .book-card p {
            font-size: 14px;
            color: #555;
        }

        footer {
            background-color: #2c3e50;
            color: white;
            text-align: center;
            padding: 15px;
            margin-top: 40px;
        }
    </style>
</head>
<body>

<header>
    <h1>📚 BookNest</h1>
    <nav>
        <a href="#">Home</a>
        <a href="#">Shop</a>
        <a href="#">Categories</a>
        <a href="#">Contact</a>
    </nav>
</header>

<section class="hero">
    <h2>Discover Your Next Favorite Book</h2>
    <p>Explore thousands of books across all genres</p>
</section>

<section class="section">
    <h2>Featured Books</h2>
    <div class="books">
        <div class="book-card">
            <img src="https://images.unsplash.com/photo-1544947950-fa07a98d237f" alt="Book">
            <h3>The Great Adventure</h3>
            <p>by John Doe</p>
        </div>

        <div class="book-card">
            <img src="https://images.unsplash.com/photo-1519681393784-d120267933ba" alt="Book">
            <h3>Learning Web Design</h3>
            <p>by Jane Smith</p>
        </div>

        <div class="book-card">
            <img src="https://images.unsplash.com/photo-1524995997946-a1c2e315a42f" alt="Book">
            <h3>Mystery of the Night</h3>
            <p>by Alex Brown</p>
        </div>
    </div>
</section>

<footer>
    <p>&copy; 2026 BookNest. All rights reserved.</p>
</footer>

</body>
</html>
